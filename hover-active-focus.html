<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Ngoding Time</title>
    <style>
        input {
            padding: 6px 12px 6px 12px;
            border: 1px solid #665544;      
            color: #ffffff;
            background-color: #665544;  
        }

        input.submit:hover {
            background-color: #665544;
            cursor: pointer;
        }

        input.submit:active {
            background-color: chocolate;
        }

        input.text {
            color: #cccccc;
            background-color: #ffffff;
        }

        input.text:focus {
            color: #665544;
            outline: none;
        }


    </style>
 </head>

 <body>
    <form>
        <input type="text" class="text" placeholder="Type here...">
        <input type="submit" class="submit" value="submit">
    </form>
 </body>
</html>
