<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Form ALignment</title>
        <style>
            div {
                border-bottom: 1px solid #efefef;
                margin: 10px;
                padding-bottom: 10px;
                width: 260px;
            }

            .title {
                float: left;
                width: 100px;
                text-align: right;
                padding-right: 10px;
            }

            .radio-buttons label {
                float: none;
            }

            .submit {
                text-align: right;
            }

            input[type="text"], input[type="email"] {
                width: 150px;
                border: 1px solid #ccc;
                padding: 2px;
            }

            button {
                padding: 2px 10px;
            }
        </style>
        <body>
            <form>
                <div>
                <label class="title" for="name">Name</label>
                <label type="text" id="name" name="name"</label>
                    </div>

                      <div>
                <label class="title" for="Email">email</label>
                <label type="text" id="Email" name="Email"</label>
                    </div>

                    <div class="radio-buttons">
<span class="title">Gender</span>
<input type="radio" id="male" name="gender" value="M">
<label for="male">M</label>
<input type="radio" id="Famale" name="gender" value="F">
<label for="Famale">F</label>
                    </div>

                    <div class="submit">
<button type="submit">Register</button>
                    </div>
            </form>
        </body>
    </head>

</html>
