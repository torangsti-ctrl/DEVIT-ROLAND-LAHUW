<!DOCTYPE html>
<html >
<head>
    <style>
        table {
            border-collapse: collapse;
            width: 300px;
        }

        td.one {
            border width: 2px;
            border-style: solid;
            border-color: black;
            padding: 5px;
        }

        td.two {
            border width: thick;
            border-style: solid;
            border-color: black;
            padding: 5px;
        }

        td.three {
            border width: 1px 4px 12px 4px;
            border-style: solid;
            border-color: black;
            padding: 5px;
        }
    </style>
</head>

<body>
    <table>
        <tr><td class="one">Hohner's "Clavinet" is essentially an 
 electric clavichord.</td></tr>
 <tr><td class="two">Hohner's "Clavinet" is essentially an 
 electric clavichord.</td></tr>
 <tr><td class="three">Hohner's "Clavinet" is essentially an 
 electric clavichord.</td></tr>
    </table>
</body>
</html>
